<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Grid Layout</title>
    <meta name="description" content="Visualize image in grid layout">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="wrapper">
        <header class="project-header">
            <h1>Image Grid Layout</h1>
            <p>A visually appealing images in grid layout</p>
        </header>

        <div class="grid-layout">
            <div class="grid-item grid-container-1">
                <img src="image1.jpg" alt="image1">
            </div>
            <div class="grid-item grid-container-2">
                <img src="image2.jpg" alt="image2">
            </div>
            <div class="grid-item grid-container-3">
                <img src="image3.webp" alt="image3">
            </div>
            <div class="grid-item grid-container-4">
                <img src="image4.jpg" alt="image4">
            </div>
            <div class="grid-item grid-container-5">
                <img src="image5.webp" alt="image5">
            </div>
            <div class="grid-item grid-container-6">
                <img src="image6.webp" alt="image6">
            </div>
        </div>

        <footer class="project-footer">
            <p>&copy; 2026 HTML & CSS Project. For personal use only.</p>
            <p class="credit-text">Images credited to their respective owners.</p>
        </footer>
